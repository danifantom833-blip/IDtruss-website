<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - IDtruss Ltd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">IDtruss Ltd</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="nav-toggle">&#9776;</div>
  </header>

  <section class="contact-form">
    <h2>Get in Touch</h2>
    <form action="#" method="post">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>
    <div class="contact-info">
      <p><strong>Phone:</strong> (555) 123-4567</p>
      <p><strong>Email:</strong> info@idtruss.com</p>
      <p><strong>Address:</strong> 123 Construction Ave, Cityville</p>
    </div>
    <div class="map">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18..." width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2026 IDtruss Ltd</p>
      <div class="social">
        <a href="#">Twitter</a> |
        <a href="#">LinkedIn</a> |
        <a href="#">Facebook</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
